services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ao
      POSTGRES_USER: ao
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  langfuse:
    image: langfuse/langfuse:latest
    environment:
      DATABASE_URL: postgresql://ao:localdev@postgres:5432/ao
      NEXTAUTH_SECRET: local-dev-secret
      NEXTAUTH_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  ao-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ao-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ao:localdev@postgres:5432/ao
      LANGFUSE_HOST: http://langfuse:3000
    depends_on:
      - redis
      - postgres
      - langfuse

volumes:
  pgdata:
