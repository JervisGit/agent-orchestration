services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ao
      POSTGRES_USER: ao
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://ao:localdev@postgres:5432/langfuse
      NEXTAUTH_SECRET: local-dev-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      SALT: local-dev-salt-ao
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

  ao-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ao-api
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://ao:localdev@postgres:5432/ao
      LANGFUSE_HOST: http://langfuse:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    depends_on:
      - redis
      - postgres
      - langfuse

  email-assistant:
    build:
      context: ..
      dockerfile: docker/Dockerfile.email-assistant
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ao:localdev@postgres:5432/ao
      LANGFUSE_HOST: http://langfuse:3000
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma3:1b
    depends_on:
      - postgres
      - langfuse

volumes:
  pgdata:
