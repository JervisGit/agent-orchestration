# RAG Search — AO App Manifest

app_id: rag_search
display_name: RAG Search
description: Internal knowledge search powered by retrieval-augmented generation

# Workflow: input → search_agent (retrieves + synthesises) → END
pattern: linear

# Identity — user-delegated in production; service for local dev
identity_mode: user_delegated
service_principal_id: ${RAG_SEARCH_SP_CLIENT_ID}

llm_endpoint: ${AZURE_OPENAI_ENDPOINT}
llm_api_key_secret: azure-openai-api-key

langfuse_project: rag-search

agents:
  - name: search_agent
    system_prompt: |
      You are a search assistant for an internal knowledge base.
      A user has asked a question. You have access to the 'vector_search' tool
      which searches the document index. Use it to find relevant content, then
      synthesise a clear, concise answer grounded in those results.
      Always cite the source document titles in your answer (e.g. [1], [2]).
      If you cannot find relevant information, say so honestly — do not invent facts.
    model: gpt-4o
    tools:
      - vector_search
    temperature: 0.1

tools:
  # Production: Azure AI Search endpoint (injected by Terraform)
  # Local dev: pgvector implementation registered in app.py overrides this
  - name: vector_search
    type: search_index
    description: Vector search over internal document index
    params:
      top_k: 5

policies:
  - name: pii_filter
    stage: post_execution
    action: redact
  - name: content_safety
    stage: pre_execution
    action: block
    stage: runtime
    max_tokens_per_run: 50000
