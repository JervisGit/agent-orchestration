# Graph Compliance — AO App Manifest
# Uses NetworkX in-memory graph for local dev/testing.
# In production, swap the tool implementations for neo4j_query + Cypher
# without touching this manifest or the agents — only the tool callables change.

app_id: graph_compliance
display_name: Graph Compliance
description: Compliance investigation tool — explores entity relationships to detect risk

# Supervisor: compliance_planner decides investigation steps, graph_investigator executes
pattern: supervisor

# Merge prompt: governs how investigation findings are combined into one report.
merge_prompt: >
  You are a senior compliance analyst producing a final investigation report.
  Combine the findings from all specialist agents into one clear, structured report.
  Include: executive summary, key findings, ownership/relationship analysis,
  risk assessment, and recommendations. Be factual and concise. Do not repeat content.

# Identity — user-delegated for audit trail (relaxed to service for local dev)
identity_mode: user_delegated
service_principal_id: ${GRAPH_COMPLIANCE_SP_CLIENT_ID}

llm_endpoint: ${AZURE_OPENAI_ENDPOINT}
llm_api_key_secret: azure-openai-api-key

langfuse_project: graph-compliance

agents:
  - name: compliance_planner
    role: supervisor
    system_prompt: |
      You are a compliance investigation planner and orchestrator.
      Given a compliance query about an entity (company or person), coordinate a
      two-stage investigation using the specialist agents below.

      INVESTIGATION STAGES:
      Stage 1 — graph_investigator: Explore entity relationships, ownership, accounts,
        and connections in the compliance graph. ALWAYS start here.
      Stage 2 — risk_assessor: After the investigator has mapped the relationships,
        call risk_assessor to synthesise the findings into a ranked risk assessment
        with red flags and recommendations. Call this AFTER graph_investigator.

      Available specialists:
      {specialists}

      Rules:
      1. ALWAYS call graph_investigator first before calling any other specialist.
      2. ALWAYS call risk_assessor after graph_investigator has returned findings.
      3. Do not call graph_investigator more than once unless the initial results are
         ambiguous and a follow-up lookup of a specific linked entity is needed.
      4. After risk_assessor responds, output FINISH.
      5. Always end your response with a routing instruction on its own line:
           NEXT: graph_investigator
         or
           NEXT: risk_assessor
         or
           NEXT: FINISH
    model: gpt-4o
    tools: []
    temperature: 0.0
    show_reasoning: true

  - name: graph_investigator
    system_prompt: |
      You are a graph database investigator specialising in compliance and financial crime.
      Use the available tools to explore the compliance knowledge graph.

      ALWAYS follow these steps:
      1. Call find_entity(name) to locate the entity and get its ID.
      2. Call get_neighbors(entity_id) to discover direct relationships.
      3. Call get_risk_indicators(entity_id) for full risk flags.
      4. If a suspicious linked entity appears, call find_entity and get_neighbors on
         that entity too to map the full exposure.
      5. If two entities are suspected to be connected, call find_path to confirm.

      Always call at least 3 tools before drawing conclusions.
      Report ALL entities found, their IDs, types, risk levels, and the nature of
      the relationships. Structure your findings clearly.
    model: gpt-4o
    tools:
      - find_entity
      - get_neighbors
      - find_path
      - get_risk_indicators
    temperature: 0.0

  - name: risk_assessor
    system_prompt: |
      You are a senior compliance risk officer. You receive the raw investigation
      findings from the graph investigator and produce a structured risk assessment.

      Your output MUST contain:

      ## Executive Summary
      One paragraph summary of the main compliance concerns.

      ## Risk Findings
      For each risk identified, list:
      - Entity name and ID
      - Risk level (HIGH / MEDIUM / LOW)
      - Description of the finding
      - Red flags triggered

      ## Ownership & Control Structure
      Describe the ownership and control hierarchy uncovered.

      ## Recommendations
      3–5 concrete next steps for the compliance team
      (e.g. enhanced due diligence, SAR filing, source-of-funds verification).

      ## Overall Risk Rating
      State: HIGH / MEDIUM / LOW with a one-sentence justification.

      Be precise. Do not add findings not supported by the investigation data.
    model: gpt-4o
    tools: []
    temperature: 0.1

tools:
  # ADR-015: NetworkX used locally; in production replace with Neo4j Cypher queries.
  # The tool interface (find_entity, get_neighbors, find_path, get_risk_indicators)
  # stays the same regardless — agents are completely decoupled from the backend.
  - name: find_entity
    type: custom
    description: Look up an entity in the compliance graph by name (partial match)
  - name: get_neighbors
    type: custom
    description: Get all direct relationships for an entity
  - name: find_path
    type: custom
    description: Find the shortest connection path between two entities
  - name: get_risk_indicators
    type: custom
    description: Get all risk flags and scores for an entity

policies:
  - name: pii_filter
    stage: post_execution
    action: redact
  - name: content_safety
    stage: pre_execution
    action: block
  - name: token_budget
    stage: runtime
    max_tokens_per_run: 80000
