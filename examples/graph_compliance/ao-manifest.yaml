# Graph Compliance — AO App Manifest
# Uses NetworkX in-memory graph for local dev/testing.
# In production, swap the tool implementations for neo4j_query + Cypher
# without touching this manifest or the agents — only the tool callables change.

app_id: graph_compliance
display_name: Graph Compliance
description: Compliance investigation tool — explores entity relationships to detect risk

# Supervisor: compliance_planner decides investigation steps, graph_investigator executes
pattern: supervisor

# Identity — user-delegated for audit trail (relaxed to service for local dev)
identity_mode: user_delegated
service_principal_id: ${GRAPH_COMPLIANCE_SP_CLIENT_ID}

llm_endpoint: ${AZURE_OPENAI_ENDPOINT}
llm_api_key_secret: azure-openai-api-key

langfuse_project: graph-compliance

agents:
  - name: compliance_planner
    role: supervisor
    system_prompt: |
      You are a compliance investigation planner and orchestrator.
      Given a compliance query about an entity (company or person), break it down into
      investigation steps and delegate to the graph_investigator specialist.

      At each step you MUST decide what the investigator should look at next based on
      what has already been found.  When you have enough information to give a complete
      answer, output FINISH.

      Available specialists:
      {specialists}

      Rules:
      1. Delegate to graph_investigator before drawing any conclusions.
      2. After each specialist response, decide whether another investigation step is needed.
      3. Do not call the same specialist more than once for the same sub-question.
      4. Always end your response with a routing instruction on its own line:
           NEXT: graph_investigator
         or
           NEXT: FINISH
    model: gpt-4o
    tools: []
    temperature: 0.0
    show_reasoning: true

  - name: graph_investigator
    system_prompt: |
      You are a graph database investigator. Use the available tools to explore the
      compliance knowledge graph and surface relationships, risk indicators, and patterns.

      Available tools:
      - find_entity(name): Look up an entity (company or person) by name
      - get_neighbors(entity_id, relationship_type): Get direct relationships
      - find_path(from_entity_id, to_entity_id): Find connection path between two entities
      - get_risk_indicators(entity_id): Get all risk flags for an entity

      Always call at least one tool before drawing conclusions.
      Summarise your findings clearly, noting risk level (LOW / MEDIUM / HIGH).
    model: gpt-4o
    tools:
      - find_entity
      - get_neighbors
      - find_path
      - get_risk_indicators
    temperature: 0.0

tools:
  # ADR-015: NetworkX used locally; in production replace with Neo4j Cypher queries.
  # The tool interface (find_entity, get_neighbors, find_path, get_risk_indicators)
  # stays the same regardless — agents are completely decoupled from the backend.
  - name: find_entity
    type: custom
    description: Look up an entity in the compliance graph by name (partial match)
  - name: get_neighbors
    type: custom
    description: Get all direct relationships for an entity
  - name: find_path
    type: custom
    description: Find the shortest connection path between two entities
  - name: get_risk_indicators
    type: custom
    description: Get all risk flags and scores for an entity

policies:
  - name: pii_filter
    stage: post_execution
    action: redact
  - name: content_safety
    stage: pre_execution
    action: block
    action: block
  - name: token_budget
    stage: runtime
    max_tokens_per_run: 80000
