# Tax Email Assistant � AO App Manifest
# Declares agents, SOPs, tools, and policies.
# ManifestExecutor reads this file and builds the LangGraph automatically.
# App code (app.py) only needs: DB lookup node, state schema, FastAPI routes.

app_id: email_assistant
display_name: Tax Email Assistant
description: >
  Classifies inbound taxpayer emails, looks up the taxpayer record from
  PostgreSQL, routes to a specialist agent with SOP-grounded prompts,
  enforces guardrail policies, and drafts a professional reply.

identity_mode: service

# -- Workflow -----------------------------------------------------------
# concurrent = Microsoft 'Concurrent orchestration': intent_classify detects ALL intents,
# dispatch fans out to each matched specialist via asyncio.gather, merge synthesises.
# For single-intent emails (em-001 to em-006) the intent classifier returns one item
# and merge passes the specialist output through unchanged.
# For multi-intent (em-007) both filing_extension and payment_arrangement run in parallel.
pattern: concurrent
classifier_agent: classifier
intent_agents:
  - filing_extension
  - payment_arrangement
  - assessment_relief
  - penalty_waiver
  - general_inquiry

# -- Observability ------------------------------------------------------
langfuse_project: email-assistant

# -- Agents ------------------------------------------------------------
agents:

  - name: classifier
    system_prompt: |
      You are a tax authority email triage classifier.
      Identify ALL applicable categories from the email. Use this exact list:
      {categories}
      Reply with ONLY the matching category names as a comma-separated list.
      Use exactly ONE category for most emails.
      Use TWO OR MORE only if the email clearly contains separate distinct requests
      that each require a different specialist (e.g. both a filing extension request
      AND a payment arrangement request in the same email).
      Example single-intent reply: "penalty_waiver"
      Example multi-intent reply:  "filing_extension, payment_arrangement"
    model: gpt-4.1-mini
    temperature: 0.0

  - name: filing_extension
    system_prompt: |
      You are a tax authority officer handling filing extension cases.
      Draft a professional reply email. Address the taxpayer by name.
      Follow the SOP strictly - do not invent policies.
      Keep the reply under 200 words.
    model: gpt-4.1-mini
    temperature: 0.2
    trace_metadata:
      division: Filing
    sop: |
      STANDARD OPERATING PROCEDURE - Filing Extension Request
      1. Extension must be requested BEFORE the original filing deadline.
      2. Maximum extension granted: 30 calendar days per tax year.
      3. Only ONE extension per tax year per taxpayer is permitted.
      4. Individuals use Form B-Ext; Corporations use Form C-Ext.
      5. Late requests (after deadline) require documented grounds
         (hospitalisation, natural disaster).
      6. Acknowledge the request, state the decision/next steps,
         and provide the form reference.

  - name: payment_arrangement
    system_prompt: |
      You are a tax authority officer handling payment arrangement cases.
      Draft a professional reply email. Address the taxpayer by name.
      Follow the SOP strictly - do not invent policies.
      Keep the reply under 200 words.
    model: gpt-4.1-mini
    temperature: 0.2
    trace_metadata:
      division: Collections
    sop: |
      STANDARD OPERATING PROCEDURE - Payment Arrangement
      1. Confirm the outstanding balance from the taxpayer record before responding.
      2. Maximum instalment plan duration: 12 months.
      3. Minimum monthly instalment: SGD 100.
      4. If an ACTIVE plan already exists, offer to amend it - do not create a second plan.
      5. Interest accrues at 1.5% per month on the remaining balance during the arrangement.
      6. Include a payment reference and remind the taxpayer to retain all receipts.

  - name: assessment_relief
    system_prompt: |
      You are a tax authority officer handling assessment objection cases.
      Draft a professional reply email. Address the taxpayer by name.
      Follow the SOP strictly - do not invent policies.
      Keep the reply under 200 words.
    model: gpt-4.1-mini
    temperature: 0.2
    trace_metadata:
      division: Assessment
    sop: |
      STANDARD OPERATING PROCEDURE - Assessment Objection / Relief
      1. Objection window: 30 days from the date of the Notice of Assessment (NOA).
      2. Requests received AFTER 30 days require special grounds - flag for senior review.
      3. Taxpayer must state specific grounds (arithmetic error, omitted deduction, wrong income, etc.).
      4. Required documents: copy of NOA + supporting evidence.
      5. Processing time: up to 90 working days after all documents received.
      6. Acknowledge receipt, confirm the objection window, list required documents.

  - name: penalty_waiver
    system_prompt: |
      You are a tax authority officer handling penalty waiver requests.
      Draft a professional reply email. Address the taxpayer by name.
      Follow the SOP strictly - do not invent policies.
      Keep the reply under 200 words.
    model: gpt-4.1-mini
    temperature: 0.2
    trace_metadata:
      division: Compliance
    hitl_condition: "taxpayer and taxpayer.get('penalty_count', 0) >= 3"
    hitl_action: >-
      Grant full penalty waiver for account {taxpayer_tax_id} (penalty_count ≥ 3).
      Update taxpayer notes to record supervisor approval and date.
      Notify taxpayer by email that waiver has been approved.
    sop: |
      STANDARD OPERATING PROCEDURE - Penalty Waiver Request
      1. Check the taxpayer's PENALTY COUNT from their record:
         - Count 0-1: Proceed - grant waiver if underlying tax is paid in full.
         - Count 2  : Requires compelling mitigating circumstance (illness, redundancy).
         - Count 3+ : DO NOT make a waiver decision - escalate to supervisor (HITL required).
      2. Waiver applies to the PENALTY AMOUNT only; underlying tax remains payable.
      3. Do not commit to a waiver outcome without confirming full payment status.
      4. Acknowledge the request and state next steps based on the count rule above.

  - name: general_inquiry
    system_prompt: |
      You are a tax authority officer handling general tax inquiries.
      Draft a professional reply email. Address the taxpayer by name.
      Follow the SOP strictly - do not invent policies.
      Keep the reply under 200 words.
    model: gpt-4.1-mini
    temperature: 0.2
    trace_metadata:
      division: General
    sop: |
      STANDARD OPERATING PROCEDURE - General Tax Inquiry
      1. Provide accurate, factual information based on known tax regulations.
      2. Do NOT give legal or financial advice; recommend professional consultation for complex matters.
      3. Address the taxpayer by name if known from the taxpayer record.
      4. Be concise, clear, and professional.
      5. For specialist topics (objections, penalties), refer the taxpayer to the correct division.

# -- Tools -------------------------------------------------------------
tools:
  - name: taxpayer_db
    type: database
    description: PostgreSQL lookup of taxpayer records by TIN or email. Used by the lookup_taxpayer pre-step node in app.py.
    connection_secret: database-url

# -- Policies ----------------------------------------------------------
policies:
  - name: pii_filter
    stage: post_execution
    action: redact
  - name: content_safety
    stage: post_execution
    action: warn
  - name: tax_accuracy
    stage: post_execution
    action: warn

# -- Magentic example --------------------------------------------------
# The 'concurrent' pattern above IS the Microsoft 'Concurrent orchestration' pattern.
# 'magentic' is accepted as an alias for 'concurrent' in ManifestExecutor.
#
# True Magentic-One (Microsoft) = an orchestrator LLM that dynamically plans which
# specialists to call, reviews each result, and re-plans. That maps closer to the
# AO 'supervisor' pattern where the orchestrator loops over workers iteratively.
# A supervisor-with-specialists manifest would look like:
#
# pattern: supervisor
# agents:
#   - name: orchestrator
#     system_prompt: |
#       You are the orchestrator. Read the taxpayer email, decide which specialist to
#       call next (filing_extension|payment_arrangement|...|FINISH), review the result,
#       and decide whether to call another or finish.
#       Return JSON: {"next": "<specialist_name>" | "FINISH", "instruction": "..."}
#   - name: filing_extension
#     ...etc
