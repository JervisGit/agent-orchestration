name: AO CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  REGISTRY: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  # ── Lint & Type Check ────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -e ao-core[dev]
          pip install ruff mypy
      - name: Ruff lint
        run: ruff check ao-core/ ao-platform/ tests/
      - name: Ruff format check
        run: ruff format --check ao-core/ ao-platform/ tests/

  # ── Unit Tests ───────────────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ao-core[dev]
      - name: Run unit tests
        run: python -m pytest tests/unit/ -v --junitxml=reports/unit.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: reports/unit.xml

  # ── Integration Tests ────────────────────────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ao-core[dev]
      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --junitxml=reports/integration.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: reports/integration.xml

  # ── Eval Tests ───────────────────────────────────────────────────
  eval-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ao-core[dev]
      - name: Run eval tests
        run: python -m pytest tests/eval/ -v --junitxml=reports/eval.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-test-results
          path: reports/eval.xml

  # ── Security Tests ──────────────────────────────────────────────
  security-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: pip install -e ao-core[dev]
      - name: Run security red-team tests
        run: python -m pytest tests/security/ -v --junitxml=reports/security.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: reports/security.xml

  # ── Build & Push Container Images ────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: [integration-tests, eval-tests, security-tests]
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR
        run: az acr login --name ${{ env.REGISTRY }}
      - name: Build and push ao-api
        run: |
          docker build -f docker/Dockerfile.ao-api -t ${{ env.REGISTRY }}/ao-api:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/ao-api:${{ github.sha }}
      - name: Build and push ao-worker
        run: |
          docker build -f docker/Dockerfile.ao-worker -t ${{ env.REGISTRY }}/ao-worker:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/ao-worker:${{ github.sha }}
      - name: Build and push email-assistant
        run: |
          docker build -f docker/Dockerfile.email-assistant -t ${{ env.REGISTRY }}/email-assistant:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/email-assistant:${{ github.sha }}
      - name: Build and push rag-search
        run: |
          docker build -f docker/Dockerfile.rag-search -t ${{ env.REGISTRY }}/rag-search:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/rag-search:${{ github.sha }}
      - name: Build and push graph-compliance
        run: |
          docker build -f docker/Dockerfile.graph-compliance -t ${{ env.REGISTRY }}/graph-compliance:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/graph-compliance:${{ github.sha }}

  # ── Deploy to Dev ────────────────────────────────────────────────
  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── ACA deploy path ──
      - name: Deploy to Container Apps (ACA)
        if: vars.COMPUTE_PLATFORM == 'aca'
        run: |
          az containerapp update \
            --name ca-ao-api-dev \
            --resource-group rg-ao-dev \
            --image ${{ env.REGISTRY }}/ao-api:${{ github.sha }}
          az containerapp update \
            --name ca-ao-worker-dev \
            --resource-group rg-ao-dev \
            --image ${{ env.REGISTRY }}/ao-worker:${{ github.sha }}
          az containerapp update \
            --name ca-email-assistant-dev \
            --resource-group rg-ao-dev \
            --image ${{ env.REGISTRY }}/email-assistant:${{ github.sha }}
          az containerapp update \
            --name ca-rag-search-dev \
            --resource-group rg-ao-dev \
            --image ${{ env.REGISTRY }}/rag-search:${{ github.sha }}
          az containerapp update \
            --name ca-graph-compliance-dev \
            --resource-group rg-ao-dev \
            --image ${{ env.REGISTRY }}/graph-compliance:${{ github.sha }}

      # ── AKS deploy path ──
      - name: Deploy to AKS
        if: vars.COMPUTE_PLATFORM == 'aks'
        run: |
          az aks get-credentials --resource-group rg-ao-dev --name ${{ vars.AKS_CLUSTER_NAME }}
          kubectl set image deployment/ao-api ao-api=${{ env.REGISTRY }}/ao-api:${{ github.sha }} -n ao-dev
          kubectl set image deployment/ao-worker ao-worker=${{ env.REGISTRY }}/ao-worker:${{ github.sha }} -n ao-dev
          kubectl rollout status deployment/ao-api -n ao-dev --timeout=300s


